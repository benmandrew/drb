name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Dafny
      uses: dafny-lang/setup-dafny-action@v1
      with:
        dafny-version: "4.11.0"
    - name: Check formatting
      run: make format-check
    - name: Verify Dafny code
      run: make verify

  build-go:
    needs: verify
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Dafny
      uses: dafny-lang/setup-dafny-action@v1
      with:
        dafny-version: "4.11.0"
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: stable
    - name: Install goimports
      run: go install golang.org/x/tools/cmd/goimports@latest
    - name: Build Go target
      run: make go

  build-rust:
    needs: verify
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Dafny
      uses: dafny-lang/setup-dafny-action@v1
      with:
        dafny-version: "4.11.0"
    - name: Build Rust target
      run: make rust
